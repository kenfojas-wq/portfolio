<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#EEF0F8"/>
  <!-- Social graph nodes -->
  <circle cx="200" cy="150" r="22" fill="#1877F2" opacity="0.7"/>
  <circle cx="120" cy="100" r="14" fill="#7B68EE" opacity="0.55"/>
  <circle cx="290" cy="110" r="16" fill="#1877F2" opacity="0.50"/>
  <circle cx="100" cy="200" r="12" fill="#7B68EE" opacity="0.45"/>
  <circle cx="310" cy="200" r="18" fill="#1877F2" opacity="0.45"/>
  <circle cx="200" cy="240" r="10" fill="#7B68EE" opacity="0.40"/>
  <circle cx="155" cy="70"  r="9"  fill="#1877F2" opacity="0.35"/>
  <circle cx="255" cy="250" r="8"  fill="#7B68EE" opacity="0.35"/>
  <!-- Connecting edges -->
  <line x1="200" y1="150" x2="120" y2="100" stroke="#1877F2" stroke-width="1" opacity="0.20"/>
  <line x1="200" y1="150" x2="290" y2="110" stroke="#1877F2" stroke-width="1" opacity="0.20"/>
  <line x1="200" y1="150" x2="100" y2="200" stroke="#1877F2" stroke-width="1" opacity="0.20"/>
  <line x1="200" y1="150" x2="310" y2="200" stroke="#1877F2" stroke-width="1" opacity="0.20"/>
  <line x1="200" y1="150" x2="200" y2="240" stroke="#1877F2" stroke-width="1" opacity="0.20"/>
  <line x1="120" y1="100" x2="155" y2="70"  stroke="#7B68EE" stroke-width="0.8" opacity="0.15"/>
  <line x1="310" y1="200" x2="255" y2="250" stroke="#7B68EE" stroke-width="0.8" opacity="0.15"/>
</svg>
