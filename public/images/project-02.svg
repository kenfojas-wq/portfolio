<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#111111"/>
  <!-- Concentric rings — rebellious identity system -->
  <circle cx="200" cy="150" r="130" fill="none" stroke="#00D632" stroke-width="0.8" opacity="0.25"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#00D632" stroke-width="0.8" opacity="0.30"/>
  <circle cx="200" cy="150" r="70"  fill="none" stroke="#00D632" stroke-width="1.0" opacity="0.40"/>
  <circle cx="200" cy="150" r="44"  fill="none" stroke="#00D632" stroke-width="1.2" opacity="0.55"/>
  <circle cx="200" cy="150" r="18"  fill="#00D632" opacity="0.70"/>
  <!-- Cross grid -->
  <line x1="200" y1="10"  x2="200" y2="290" stroke="#00D632" stroke-width="0.5" opacity="0.20"/>
  <line x1="10"  y1="150" x2="390" y2="150" stroke="#00D632" stroke-width="0.5" opacity="0.20"/>
  <!-- Wave fill bottom -->
  <path d="M0,230 Q100,190 200,220 Q300,250 400,210 L400,300 L0,300Z" fill="#00D632" opacity="0.08"/>
</svg>
